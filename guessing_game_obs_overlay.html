<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guessing Game Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            background-color: transparent; /* Remains transparent for OBS */
            overflow: hidden;
            color: white;
        }

        /* Winner Popup Animation */
        #winner-popup {
            transform: translateY(-150%);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #winner-popup.show {
            transform: translateY(0);
        }

        /* Leaderboard sliding animations */
        .lb-entry {
            animation: slideInRight 0.5s forwards ease-out;
            opacity: 0;
            transform: translateX(50px);
        }

        @keyframes slideInRight {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Confetti Canvas */
        #confetti {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body class="w-screen h-screen flex flex-col justify-between p-8 relative">

    <!-- Confetti Layer -->
    <canvas id="confetti"></canvas>

    <!-- Top Area: Winner Announcement -->
    <div class="w-full flex justify-center mt-10 absolute top-10 left-0 z-20">
        <div id="winner-popup" class="bg-gradient-to-r from-purple-600 to-blue-600 rounded-3xl p-1 shadow-[0_0_40px_rgba(124,58,237,0.5)] flex flex-col items-center">
            <div class="bg-gray-900 rounded-[22px] px-12 py-8 flex flex-col items-center border border-white/10">
                <h2 class="text-2xl text-purple-400 font-bold tracking-widest uppercase mb-1">We Have A Winner!</h2>
                <h1 id="winner-name" class="text-5xl font-black text-white mb-4">Username</h1>
                <div class="bg-white/10 px-6 py-3 rounded-xl border border-white/20">
                    <span class="text-gray-300 text-lg">The word was: </span>
                    <span id="winner-word" class="text-3xl font-bold text-yellow-400 ml-2">WORD</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Area: Leaderboard -->
    <div class="absolute bottom-10 right-10 z-20">
        <div class="bg-gray-900/90 backdrop-blur-md border border-gray-700 p-6 rounded-2xl shadow-2xl min-w-[300px]">
            <div class="flex items-center gap-3 mb-4 border-b border-gray-700 pb-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-yellow-400"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
                <h2 class="text-xl font-bold uppercase tracking-wide">Stream Standings</h2>
            </div>
            
            <div id="leaderboard-list" class="flex flex-col gap-3">
                <div class="text-gray-400 text-sm italic py-2">No winners yet. Guess the word!</div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. GAME LOGIC & LEADERBOARD ---
        let scores = {};

        function handleWinner(username, word, points) {
            document.getElementById('winner-name').innerText = username;
            document.getElementById('winner-word').innerText = word;
            
            const popup = document.getElementById('winner-popup');
            popup.classList.add('show');
            fireConfetti();

            if(!scores[username]) scores[username] = 0;
            scores[username] += points;
            renderLeaderboard();

            setTimeout(() => {
                popup.classList.remove('show');
            }, 8000);
        }

        function renderLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = '';

            const sortedUsers = Object.entries(scores)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);

            sortedUsers.forEach((entry, index) => {
                const row = document.createElement('div');
                row.className = 'lb-entry flex justify-between items-center bg-white/5 rounded-lg p-3 border border-white/5';
                row.style.animationDelay = `${index * 0.1}s`; 
                
                let rankColors = ['text-yellow-400', 'text-gray-300', 'text-amber-600', 'text-gray-400', 'text-gray-500'];
                let rankColor = rankColors[index] || 'text-gray-500';

                row.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="font-bold ${rankColor} w-4">${index + 1}</span>
                        <span class="font-semibold">${entry[0]}</span>
                    </div>
                    <span class="font-bold bg-purple-600/30 text-purple-300 px-3 py-1 rounded-full text-sm">
                        ${entry[1]} pts
                    </span>
                `;
                list.appendChild(row);
            });
        }

        // --- 2. WEBSOCKET CONNECTION TO STREAMER.BOT ---
        let ws;
        function connectWS() {
            // Allows passing a custom IP/Port via URL (e.g. ?ws=192.168.1.5:8080)
            // Defaults to 127.0.0.1:8080 (the local machine running OBS and Streamer.bot)
            const urlParams = new URLSearchParams(window.location.search);
            const wsAddress = urlParams.get('ws') || '127.0.0.1:8080';
            const wsUrl = `ws://${wsAddress}/`;

            try {
                console.log(`Attempting to connect to Streamer.bot at ${wsUrl}`);
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => console.log('Connected to Streamer.bot!');
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if(data.event === "winner") {
                            handleWinner(data.user, data.word, data.points || 10);
                        }
                    } catch(e) { console.error("Error parsing WS message", e); }
                };

                ws.onclose = () => {
                    console.log('WS Disconnected. Reconnecting in 3s...');
                    setTimeout(connectWS, 3000);
                };
            } catch (error) {
                console.warn("WebSocket blocked (Expected in Canvas/Secure Web Previews):", error);
                console.info("Don't worry! This code will work perfectly when added as a Browser Source in OBS.");
                
                // Trigger a demo animation so it can be previewed in the Canvas environment!
                setTimeout(() => {
                    handleWinner("DemoUser", "PREVIEW", 100);
                }, 1500);
            }
        }
        
        connectWS();

        // --- 3. CONFETTI SYSTEM ---
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function fireConfetti() {
            particles = [];
            const colors = ['#facc15', '#a855f7', '#3b82f6', '#ec4899', '#22c55e'];
            
            for(let i = 0; i < 150; i++) {
                particles.push({
                    x: canvas.width / 2, 
                    y: -20,
                    r: Math.random() * 6 + 4,
                    dx: Math.random() * 10 - 5,
                    dy: Math.random() * -10 + 2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10 - 10,
                    tiltAngleInc: (Math.random() * 0.07) + 0.05,
                    tiltAngle: 0
                });
            }

            if(animationId) cancelAnimationFrame(animationId);
            animateConfetti();
        }

        function animateConfetti() {
            requestAnimationFrame(animateConfetti);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let active = false;
            particles.forEach((p) => {
                p.tiltAngle += p.tiltAngleInc;
                p.y += (Math.cos(p.tiltAngle) + 1 + p.r / 2) / 2 + 2; 
                p.x += Math.sin(p.tiltAngle) * 2 + p.dx; 
                
                if (p.y <= canvas.height) active = true;

                ctx.beginPath();
                ctx.lineWidth = p.r;
                ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r, p.y);
                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
                ctx.stroke();
            });

            if(!active) {
                cancelAnimationFrame(animationId);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }
    </script>
</body>
</html>
